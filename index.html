<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Compass Debug</title>
</head>
<body style="background:#000; color:#0f0; font-family:monospace; padding:20px;">
    <h1>Debug: <span id="status">待機中</span></h1>
    <div style="font-size: 3rem;">ミル: <span id="mils">--</span></div>
    <div style="margin-top:20px;">
        <button id="start-btn" style="padding:20px; font-size:1.5rem;">センサー起動</button>
    </div>

    <script>
        const btn = document.getElementById('start-btn');
        const status = document.getElementById('status');
        const milsText = document.getElementById('mils');

        btn.addEventListener('click', () => {
            if (typeof DeviceOrientationEvent.requestPermission === 'function') {
                status.innerText = "許可を確認中...";
                DeviceOrientationEvent.requestPermission()
                    .then(response => {
                        if (response === 'granted') {
                            status.innerText = "許可済み！";
                            window.addEventListener('deviceorientation', handleOrientation);
                        } else {
                            status.innerText = "許可が拒否されました";
                        }
                    })
                    .catch(e => status.innerText = "エラー: " + e);
            } else {
                status.innerText = "許可不要デバイス";
                window.addEventListener('deviceorientation', handleOrientation);
            }
        });

        function handleOrientation(event) {
            let heading = event.webkitCompassHeading;
            if (heading !== null) {
                let mils = Math.round(heading * (6400 / 360));
                milsText.innerText = mils;
                status.innerText = "動作中";
            } else {
                status.innerText = "センサー値が取得できません（iPhone以外？）";
            }
        }
    </script>
</body>
</html>
