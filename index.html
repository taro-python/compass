<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>MIL Compass</title>
    <style>
        body { background: #1a1a1a; color: #00ff00; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; font-family: monospace; }
        
        #compass-face {
            width: 300px; height: 300px;
            border: 4px solid #00ff00; border-radius: 50%;
            position: relative; /* 子要素の基準点 */
            display: flex; align-items: center; justify-content: center;
        }

        /* 針の設定 */
        #needle {
            width: 6px; height: 120px;
            background: #ff0000;
            position: absolute;
            transform-origin: bottom center;
            transition: transform 0.1s ease-out;
            z-index: 10;
        }

        /* 目盛りの設定 */
        .tick {
            position: absolute;
            width: 2px; height: 20px;
            background: #00ff00;
            /* ここで中心に配置し、後でJSで回転させる */
            transform-origin: center bottom; 
        }

        #display { font-size: 3rem; margin-top: 30px; }
    </style>
</head>
<body>

    <div id="compass-face">
        <div id="needle"></div>
        </div>
    
    <div id="display">0000 MIL</div>
    <button id="start-btn" style="padding:15px; margin-top:20px;">コンパス起動</button>

    <script>
        const face = document.getElementById('compass-face');
        const needle = document.getElementById('needle');
        const display = document.getElementById('display');
        const btn = document.getElementById('start-btn');

        // 目盛りを16個（400ミル刻み）描画
        for (let i = 0; i < 16; i++) {
            const tick = document.createElement('div');
            tick.className = 'tick';
            // 回転(rotate)してから外側に押し出す(translateY)
            const angle = i * 22.5; 
            tick.style.transform = `rotate(${angle}deg) translateY(-140px)`;
            face.appendChild(tick);
        }

        btn.addEventListener('click', async () => {
            if (typeof DeviceOrientationEvent.requestPermission === 'function') {
                const permission = await DeviceOrientationEvent.requestPermission();
                if (permission === 'granted') {
                    btn.style.display = 'none';
                    startCompass();
                }
            } else {
                btn.style.display = 'none';
                startCompass();
            }
        });

        function startCompass() {
            window.addEventListener('deviceorientation', (event) => {
                let heading = event.webkitCompassHeading;
                if (heading !== undefined && heading !== null) {
                    needle.style.transform = `rotate(${heading}deg)`;
                    let mils = Math.round(heading * (6400 / 360));
                    display.innerText = mils.toString().padStart(4, '0') + " MIL";
                }
            });
        }
    </script>
</body>
</html>
