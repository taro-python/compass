<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>MIL Compass</title>
    <script src="https://cdn.jsdelivr.net/npm/mgrs@1.0.0/dist/mgrs.min.js"></script>
    <style>
        body { background: #1a1a1a; color: #00ff00; font-family: monospace; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        #mgrs-display { position: absolute; top: 10px; right: 10px; font-size: 0.9rem; text-align: right; }
        #compass-face { width: 300px; height: 300px; border: 4px solid #00ff00; border-radius: 50%; position: relative; }
        #needle { width: 4px; height: 120px; background: #ff0000; position: absolute; left: 50%; top: 50%; margin-left: -2px; margin-top: -120px; transform-origin: bottom center; transition: transform 0.1s linear; }
        .tick-container { position: absolute; width: 100%; height: 100%; top: 0; left: 0; }
        .tick { width: 2px; height: 15px; background: #00ff00; margin: 0 auto; }
        #display { font-size: 3rem; margin-top: 20px; }
    </style>
</head>
<body>

    <div id="mgrs-display">MGRS: START...</div>
    <div id="compass-face">
        <div id="needle"></div>
    </div>
    <div id="display">0000 MIL</div>
    <button id="start-btn" style="padding:15px; margin-top:20px;">コンパス起動</button>

    <script>
        const face = document.getElementById('compass-face');
        const needle = document.getElementById('needle');
        const display = document.getElementById('display');
        const btn = document.getElementById('start-btn');
        const mgrsText = document.getElementById('mgrs-display');

        // メモリ描画（コードは同じ）
        for (let i = 0; i < 32; i++) {
            const container = document.createElement('div');
            container.className = 'tick-container';
            container.style.transform = `rotate(${i * (360/32)}deg)`;
            const tick = document.createElement('div');
            tick.className = 'tick';
            container.appendChild(tick);
            face.appendChild(container);
        }

        btn.addEventListener('click', async () => {
            if (typeof DeviceOrientationEvent.requestPermission === 'function') {
                const p1 = await DeviceOrientationEvent.requestPermission();
                if (p1 !== 'granted') return;
            }
            
            // 位置情報の取得とMGRS変換
            navigator.geolocation.getCurrentPosition(
                (pos) => {
                    // ここで緯度経度をMGRSに変換！
                    // 注意: mgrs.forwardは [経度, 緯度] の順で渡す必要があります
                    const coords = [pos.coords.longitude, pos.coords.latitude];
                    const mgrs = mgrs.forward(coords);
                    mgrsText.innerText = `MGRS:\n${mgrs}`;
                },
                (err) => { mgrsText.innerText = "GPS Error: " + err.code; }
            );

            btn.style.display = 'none';
            startCompass();
        });

        function startCompass() {
            window.addEventListener('deviceorientation', (event) => {
                let heading = event.webkitCompassHeading;
                if (heading !== null) {
                    needle.style.transform = `rotate(${heading}deg)`;
                    let mils = Math.round(heading * (6400 / 360));
                    display.innerText = mils.toString().padStart(4, '0') + " MIL";
                }
            });
        }
    </script>
</body>
</html>
