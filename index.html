<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MIL Compass</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <style>
        body { background: #1a1a1a; color: #00ff00; font-family: monospace; text-align: center; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        #display { font-size: 5rem; font-weight: bold; margin-bottom: 10px; }
        #unit { font-size: 1.5rem; border-top: 1px solid #00ff00; padding-top: 5px; }
        button { padding: 15px 30px; font-size: 1.2rem; background: #00ff00; color: #1a1a1a; border: none; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>

    <div id="app-ui" style="display:none;">
        <div id="display">0</div>
        <div id="unit">MIL (NATO 6400)</div>
    </div>

    <button id="start-btn">コンパスを起動する</button>

    <script>
        const startBtn = document.getElementById('start-btn');
        const appUi = document.getElementById('app-ui');
        const display = document.getElementById('display');

        startBtn.addEventListener('click', async () => {
            // iPhoneのセンサー使用許可をもらう儀式
            if (typeof DeviceOrientationEvent.requestPermission === 'function') {
                const permission = await DeviceOrientationEvent.requestPermission();
                if (permission === 'granted') {
                    startCompass();
                } else {
                    alert('センサーの利用が拒否されました');
                }
            } else {
                // iPhone以外（PCなど）の場合
                startCompass();
            }
        });

        function startCompass() {
            startBtn.style.display = 'none';
            appUi.style.display = 'block';

            window.addEventListener('deviceorientationwebkit', (event) => {
                // webkitCompassHeadingはiPhone専用の「真北」基準の角度
                let degrees = event.webkitCompassHeading;
                if (degrees !== undefined) {
                    // ミルに変換して四捨五入
                    let mils = Math.round(degrees * (6400 / 360));
                    // 6400に達したら0に戻す処理
                    if (mils >= 6400) mils = 0;
                    display.innerText = mils.toString().padStart(4, '0');
                }
            }, false);
        }
    </script>
</body>
</html>
