<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>MIL Compass</title>
    <style>
        body { background: #1a1a1a; color: #00ff00; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; font-family: monospace; }
        
        #compass-face {
            width: 300px; height: 300px;
            border: 4px solid #00ff00; border-radius: 50%;
            position: relative;
        }

        /* 針の設定（ここが重要！） */
        #needle {
            width: 6px; height: 140px; /* 長さ */
            background: #ff0000;
            position: absolute;
            left: 147px; top: 10px; /* 針を中央に配置 */
            transform-origin: bottom center; /* 【重要】ここが回転軸！ */
            transition: transform 0.1s ease-out;
        }

        /* 目盛りの描画（直接CSSで描く） */
        .tick {
            position: absolute; left: 149px; top: 10px;
            width: 2px; height: 20px;
            background: #00ff00;
            transform-origin: bottom center;
        }

        #display { font-size: 3rem; margin-top: 30px; }
    </style>
</head>
<body>

    <div id="compass-face">
        <div id="needle"></div>
        </div>
    
    <div id="display">0000 MIL</div>
    <button id="start-btn" style="padding:15px; margin-top:20px;">コンパス起動</button>

    <script>
        const face = document.getElementById('compass-face');
        const needle = document.getElementById('needle');
        const display = document.getElementById('display');
        const btn = document.getElementById('start-btn');

        // 目盛りを16個（400ミル刻み）描画する
        for (let i = 0; i < 16; i++) {
            const tick = document.createElement('div');
            tick.className = 'tick';
            tick.style.transform = `rotate(${i * 22.5}deg)`;
            face.appendChild(tick);
        }

        btn.addEventListener('click', async () => {
            if (typeof DeviceOrientationEvent.requestPermission === 'function') {
                const permission = await DeviceOrientationEvent.requestPermission();
                if (permission === 'granted') {
                    btn.style.display = 'none';
                    startCompass();
                }
            } else {
                btn.style.display = 'none';
                startCompass();
            }
        });

        function startCompass() {
            window.addEventListener('deviceorientation', (event) => {
                let heading = event.webkitCompassHeading;
                if (heading !== undefined && heading !== null) {
                    // 針を回転
                    needle.style.transform = `rotate(${heading}deg)`;
                    
                    // 数値を更新
                    let mils = Math.round(heading * (6400 / 360));
                    display.innerText = mils.toString().padStart(4, '0') + " MIL";
                }
            });
        }
    </script>
</body>
</html>
