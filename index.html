<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>MIL Compass</title>
    <style>
        body { background: #1a1a1a; color: #00ff00; font-family: monospace; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        
        /* 右上の座標表示 */
        #mgrs-display { position: absolute; top: 10px; right: 10px; font-size: 0.9rem; text-align: right; }

        #compass-face {
            width: 300px; height: 300px;
            border: 4px solid #00ff00; border-radius: 50%;
            position: relative; /* 子要素の基準 */
        }

        /* 針：中心を軸に回転 */
        #needle {
            width: 4px; height: 120px;
            background: #ff0000;
            position: absolute;
            left: 50%; top: 50%; /* ど真ん中へ */
            margin-left: -2px; /* 針の太さの半分だけ左にずらす */
            margin-top: -120px; /* 針の長さ分だけ上にずらす（ここが軸） */
            transform-origin: bottom center;
            transition: transform 0.1s linear;
        }

        /* メモリのコンテナ（回転の軸） */
        .tick-container {
            position: absolute;
            width: 100%; height: 100%;
            top: 0; left: 0;
        }
        /* メモリの本体 */
        .tick {
            width: 2px; height: 15px;
            background: #00ff00;
            margin: 0 auto; /* 中央寄せ */
        }

        #display { font-size: 3rem; margin-top: 20px; }
    </style>
</head>
<body>

    <div id="mgrs-display">LOC: WAITING...</div>

    <div id="compass-face">
        <div id="needle"></div>
        </div>
    
    <div id="display">0000 MIL</div>
    <button id="start-btn" style="padding:15px; margin-top:20px;">コンパス起動</button>

    <script>
        const face = document.getElementById('compass-face');
        const needle = document.getElementById('needle');
        const display = document.getElementById('display');
        const btn = document.getElementById('start-btn');
        const mgrsText = document.getElementById('mgrs-display');

        // メモリを32個（200ミル刻み）描画
        for (let i = 0; i < 32; i++) {
            const container = document.createElement('div');
            container.className = 'tick-container';
            container.style.transform = `rotate(${i * (360/32)}deg)`;
            
            const tick = document.createElement('div');
            tick.className = 'tick';
            container.appendChild(tick);
            face.appendChild(container);
        }

        btn.addEventListener('click', async () => {
            // 1. センサー許可
            if (typeof DeviceOrientationEvent.requestPermission === 'function') {
                const p1 = await DeviceOrientationEvent.requestPermission();
                if (p1 !== 'granted') return;
            }
            
            // 2. 位置情報許可
            navigator.geolocation.getCurrentPosition(
                (pos) => {
                    mgrsText.innerText = `LAT:${pos.coords.latitude.toFixed(4)}\nLON:${pos.coords.longitude.toFixed(4)}`;
                },
                (err) => { mgrsText.innerText = "GPS Error"; }
            );

            btn.style.display = 'none';
            startCompass();
        });

        function startCompass() {
            window.addEventListener('deviceorientation', (event) => {
                let heading = event.webkitCompassHeading;
                if (heading !== null) {
                    needle.style.transform = `rotate(${heading}deg)`;
                    let mils = Math.round(heading * (6400 / 360));
                    display.innerText = mils.toString().padStart(4, '0') + " MIL";
                }
            });
        }
    </script>
</body>
</html>
